<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NY Cricket Live</title>

  <link rel="dns-prefetch" href="//1.1.1.1">
  <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="//jiotvpllive.cdn.jio.com">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }
    video { width: 100%; height: 100%; background: #000; object-fit: contain; }
    .youtube-theme .shaka-bottom-controls { width: 100%; padding: 0; z-index: 1; display: flex; flex-direction: column; }
    .youtube-theme .shaka-controls-button-panel { order: 2; height: 40px; padding: 0 10px; }
    .youtube-theme .shaka-small-play-button { order: -3; }
    .youtube-theme .shaka-mute-button { order: -2; }
    .youtube-theme .shaka-current-time { padding: 0 10px; font-size: 12px; }
    .youtube-theme .shaka-seek-bar-container { height: 3px; position: relative; top: -1px; border-radius: 0; }
    .youtube-theme .shaka-seek-bar-container input[type=range]::-webkit-slider-thumb { background: #FF0000; cursor: pointer; }
    .youtube-theme .shaka-played-range { background: rgb(255,0,0) !important; }
    .shaka-spinner-container, .shaka-spinner { display: none !important; }
    
    #playOverlay { position: absolute; inset: 0; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; cursor: pointer; background: rgba(0,0,0,0.7); transition: opacity 0.4s ease; }
    #playOverlay.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
    .ring { width: 54px; height: 54px; border: 4px solid rgba(255,255,255,0.15); border-top-color: #ff0000; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #playBtn { display: none; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,0,0,0.92); align-items: center; justify-content: center; animation: pulse 2.2s infinite; }
    #playBtn svg { width: 34px; height: 34px; margin-left: 6px; fill: #fff; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.45); } 70% { box-shadow: 0 0 0 22px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }
    .overlay-label { color: #fff; font-size: 14px; }
    #channelTitle { position: absolute; left: 10px; top: 10px; color: #fff; font-size: 14px; z-index: 1500; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; }
    #watermarkLogo { position: absolute; left: 10px; top: 62%; width: 60px; opacity: 0.35; z-index: 1500; pointer-events: none; }
    #errorBox { display: none; position: absolute; inset: 0; z-index: 5000; background: #000; flex-direction: column; align-items: center; justify-content: center; color: #ff6666; gap: 16px; }
    #retryBtn { padding: 10px 28px; background: #e00; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
  <video playsinline id="video" poster="https://blogger.googleusercontent.com/img/a/AVvXsEiGqaZeRBZ6Y7yV5ZYSRiNRhBa5q9_EMx7R5TJcHd3XJwwHh2YhNOGt76Y4vEcUIjvIaA7W-Tw1RyMLP-4WZwVHA4mk18zwXl7HdSL5WabprIasDOWJO7jpL0zTQB4p_y7X0Rv0xwe-cJ-GvxofAgeRp2FIiNgB90n_b8Cqw0sAaZqVhJg_fi9UyfSO8KY"></video>
  <div id="playOverlay">
    <div class="ring" id="loadRing"></div>
    <div id="playBtn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    <div class="overlay-label" id="overlayLabel">Fetching Stream...</div>
  </div>
  <div id="channelTitle">Star Sports 1 Hindi</div>
  <img id="watermarkLogo" src="https://i.postimg.cc/J4m9Dz70/Gemini-Generated-Image-4zvnud4zvnud4zvn-Picsart-Background-Remover.png">
  <div id="errorBox">
    <span id="errorMsg">⚠ Stream error</span>
    <button id="retryBtn" onclick="retryLoad()">↺ Retry</button>
  </div>
</div>

<script>
  // Hardcoded Configuration
  const STREAM_URL = "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd";
  const COOKIE_API = "https://allrounder-live2.pages.dev/api/star-1-hindi.json";
  const DRM_KEYS = { "400131994b445d8c8817202248760fda": "2d56cb6f07a75b9aff165d534ae2bfc4" };

  const video = document.getElementById('video');
  const container = document.querySelector('.shaka-video-container');
  const playOverlay = document.getElementById('playOverlay');
  const loadRing = document.getElementById('loadRing');
  const playBtn = document.getElementById('playBtn');
  const overlayLabel = document.getElementById('overlayLabel');
  const errorBox = document.getElementById('errorBox');

  let shakaPlayer, fetchedCookie = "", streamReady = false;

  const showError = msg => { errorMsg.textContent = '⚠ ' + msg; errorBox.style.display = 'flex'; playOverlay.style.display = 'none'; };
  const markReady = () => { loadRing.style.display = 'none'; playBtn.style.display = 'flex'; overlayLabel.textContent = 'Tap to Play'; };
  const dismissOverlay = () => playOverlay.classList.add('fade-out');

  async function startPlayback() {
    if (!streamReady) return;
    try { video.muted = false; await video.play(); dismissOverlay(); }
    catch { video.muted = true; await video.play(); dismissOverlay(); }
  }

  playOverlay.addEventListener('click', startPlayback);

  document.addEventListener('DOMContentLoaded', async () => {
    shaka.polyfill.installAll();
    const player = new shaka.Player(video);
    shakaPlayer = player;
    new shaka.ui.Overlay(player, container, video);

    // DRM Config
    player.configure({ drm: { clearKeys: DRM_KEYS } });

    // Fetch dynamic cookie from your API
    try {
      const response = await fetch(COOKIE_API);
      const data = await response.json();
      fetchedCookie = data.cookie; // Format: __hdnea__=exp=...
    } catch (e) { console.error("Cookie fetch failed", e); }

    // Request Filter for Headers & Cookie Token
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
      request.headers['Referer'] = 'https://www.jiotv.com/';
      request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
      
      if (fetchedCookie) {
        request.headers['Cookie'] = fetchedCookie;
        const token = fetchedCookie.includes('=') ? fetchedCookie.split('=')[1] : fetchedCookie;
        if (!request.uris[0].includes('__hdnea__=')) {
          request.uris[0] += (request.uris[0].includes('?') ? '&' : '?') + '__hdnea__=' + token;
        }
      }
    });

    try {
      await player.load(STREAM_URL);
      streamReady = true;
      markReady();
    } catch (e) { showError("Failed to load stream."); }
  });

  function retryLoad() { location.reload(); }
</script>
</body>
</html>
